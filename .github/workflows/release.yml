name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create. Defaults to manual-<run number>-<short sha>."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6"
  PROJECT_NAME: "UniStory"

jobs:
  build-windows:
    name: Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Download Godot
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import project
        run: godot --headless --import

      - name: Export Windows build
        run: |
          mkdir -p release/win
          godot --headless --export-release "Windows Desktop" release/win/${{ env.PROJECT_NAME }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-windows
          path: release/win/

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Download Godot
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import project
        run: godot --headless --import

      - name: Export Linux build
        run: |
          mkdir -p release/linux
          godot --headless --export-release "Linux" release/linux/${{ env.PROJECT_NAME }}.x86_64
          chmod +x release/linux/${{ env.PROJECT_NAME }}.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-linux
          path: release/linux/

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Download Godot
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates + Android Build Template
        run: |
          # Export templates
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

          # Android Build Template
          ANDROID_SOURCE=~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/android_source.zip
          TPL_DIR=android/build
          mkdir -p "$TPL_DIR"
          mkdir -p android
          echo "${{ env.GODOT_VERSION }}.stable" > android/.build_version
          unzip -q "$ANDROID_SOURCE" -d "$TPL_DIR"

      - name: Validate Android signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0

          check_secret() {
            if [ -z "$1" ]; then
              echo "::error::Required Android signing secret is not configured: $2"
              missing=1
            fi
          }

          check_secret "$KEYSTORE_BASE64" "ANDROID_KEYSTORE_BASE64"
          check_secret "$KEYSTORE_PASSWORD" "ANDROID_KEYSTORE_PASSWORD"
          check_secret "$KEY_ALIAS" "ANDROID_KEY_ALIAS"
          check_secret "$KEY_PASSWORD" "ANDROID_KEY_PASSWORD"

          exit "$missing"

      - name: Configure Android signing
        run: |
          # Decode keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

          # Godot's Gradle template uses the keystore password as the key password.
          # Patch the generated template so keystores with a separate key password work in CI.
          TPL_DIR=android/build
          python - <<'PY'
          from pathlib import Path

          path = Path("android/build/build.gradle")
          text = path.read_text(encoding="utf-8")
          old = "keyPassword getReleaseKeystorePassword()"
          new = 'keyPassword System.getenv("ANDROID_KEY_PASSWORD") ?: getReleaseKeystorePassword()'

          if old not in text:
              raise SystemExit(f"Unable to find signing keyPassword line in {path}")

          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

          # Godot reads these environment variables when the preset leaves release keystore fields empty.
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=/tmp/release.jks" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Import project
        run: godot --headless --import

      - name: Export Android APK
        run: |
          mkdir -p release/android
          if ! godot --headless --export-release "Android" release/android/${{ env.PROJECT_NAME }}.apk; then
            if [ -x android/build/gradlew ]; then
              cd android/build
              ./gradlew packageStandardRelease --stacktrace --info
            fi
            exit 1
          fi

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f /tmp/release.jks

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-android
          path: release/android/

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Resolve release metadata
        id: release_meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${INPUT_RELEASE_TAG}" ]; then
            TAG="${INPUT_RELEASE_TAG}"
          else
            TAG="manual-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          FILE_TAG="${TAG//\//-}"
          FILE_TAG="${FILE_TAG//\\/-}"

          {
            echo "tag=${TAG}"
            echo "file_tag=${FILE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Package builds
        env:
          FILE_TAG: ${{ steps.release_meta.outputs.file_tag }}
        run: |
          # Windows → zip
          cd artifacts/build-windows
          zip -r "../../${{ env.PROJECT_NAME }}-${FILE_TAG}-windows-x64.zip" .
          cd ../..

          # Linux → tar.gz
          cd artifacts/build-linux
          tar czf "../../${{ env.PROJECT_NAME }}-${FILE_TAG}-linux-x64.tar.gz" .
          cd ../..

          # Android → copy APK
          cp artifacts/build-android/*.apk "${{ env.PROJECT_NAME }}-${FILE_TAG}-android.apk" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ${{ env.PROJECT_NAME }}-*-windows-x64.zip
            ${{ env.PROJECT_NAME }}-*-linux-x64.tar.gz
            ${{ env.PROJECT_NAME }}-*-android.apk
