name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  PROJECT_NAME: "UniStory"

jobs:
  build-windows:
    name: Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import project
        run: godot --headless --import

      - name: Export Windows build
        run: |
          mkdir -p release/win
          godot --headless --export-release "Windows Desktop" release/win/${{ env.PROJECT_NAME }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: release/win/

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import project
        run: godot --headless --import

      - name: Export Linux build
        run: |
          mkdir -p release/linux
          godot --headless --export-release "Linux" release/linux/${{ env.PROJECT_NAME }}.x86_64
          chmod +x release/linux/${{ env.PROJECT_NAME }}.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: release/linux/

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot
        run: |
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -o godot.zip
          chmod +x Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates + Android Build Template
        run: |
          # Export templates
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

          # Android Build Template
          wget -nv "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_android_source.zip" -O android_source.zip
          TPL_DIR=~/.local/share/godot/build_templates/android
          mkdir -p "$TPL_DIR"
          unzip -q android_source.zip -d "$TPL_DIR"

      - name: Configure Android signing
        run: |
          # Decode keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks

          # Inject signing config into Android Build Template
          TPL_DIR=~/.local/share/godot/build_templates/android
          cat > "$TPL_DIR/gradle.properties" << PROPS
          android.useAndroidX=true
          KEY_STORE_PATH=/tmp/release.jks
          KEY_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

          # Also write a signing.gradle for Godot's gradle project template
          cat > "$TPL_DIR/signing.gradle" << 'GRADLE'
          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEY_STORE_PATH") ?: "/tmp/release.jks")
                      storePassword System.getenv("KEY_STORE_PASSWORD") ?: ""
                      keyAlias System.getenv("KEY_ALIAS") ?: ""
                      keyPassword System.getenv("KEY_PASSWORD") ?: ""
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
                  debug {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

          # Export env vars for gradle
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "KEY_STORE_PATH=/tmp/release.jks" >> $GITHUB_ENV
          echo "KEY_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Import project
        run: godot --headless --import

      - name: Export Android APK
        run: |
          mkdir -p release/android
          godot --headless --export-release "Android" release/android/${{ env.PROJECT_NAME }}.apk

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f /tmp/release.jks
          rm -f ~/.local/share/godot/build_templates/android/gradle.properties

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-android
          path: release/android/

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package builds
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Windows → zip
          cd artifacts/build-windows
          zip -r ../../${{ env.PROJECT_NAME }}-${TAG}-windows-x64.zip .
          cd ../..

          # Linux → tar.gz
          cd artifacts/build-linux
          tar czf ../../${{ env.PROJECT_NAME }}-${TAG}-linux-x64.tar.gz .
          cd ../..

          # Android → copy APK
          cp artifacts/build-android/*.apk ${{ env.PROJECT_NAME }}-${TAG}-android.apk 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.PROJECT_NAME }}-*-windows-x64.zip
            ${{ env.PROJECT_NAME }}-*-linux-x64.tar.gz
            ${{ env.PROJECT_NAME }}-*-android.apk
